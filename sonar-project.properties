# SonarQube / SonarCloud configuration for @corpdk/coding-templates
#
# Project identity
sonar.projectKey=CorpDK_coding-templates
sonar.projectName=coding-templates
sonar.organization=corpdk

# What to analyze
sonar.sources=engines,libraries,packages,templates
sonar.tests=templates/ui-showcase/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# What to ignore — build output, vendored deps, generated code, lockfiles
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/.next/**,\
  **/.turbo/**,\
  **/storybook-static/**,\
  **/.storybook-static/**,\
  **/coverage/**,\
  **/__generated__/**,\
  **/generated/**,\
  **/*.generated.ts,\
  **/*.generated.tsx,\
  **/prisma/migrations/**,\
  **/drizzle/migrations/**,\
  **/*.d.ts,\
  pnpm-lock.yaml

sonar.test.exclusions=**/node_modules/**,**/dist/**

# Coverage — wire up when packages emit lcov (e.g. vitest --coverage)
# sonar.javascript.lcov.reportPaths=**/coverage/lcov.info
# sonar.typescript.lcov.reportPaths=**/coverage/lcov.info

sonar.sourceEncoding=UTF-8
